<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Explore a curated palette of 20 beautiful colors with HEX, RGB and HSL values.">
    <title>Color Palette Explorer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎨</text></svg>">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Toast notification -->
    <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <header class="topbar">
        <div class="brand">
            <span class="brand-dot"></span>
            <span class="brand-name">Palette<strong>Explorer</strong></span>
        </div>
        <button id="theme-toggle" class="theme-toggle" aria-label="Toggle dark mode" title="Toggle dark mode">
            <span class="theme-icon">🌙</span>
        </button>
    </header>

    <!-- Animated hero section -->
    <section class="hero">
        <div class="hero-bg" aria-hidden="true">
            <span class="blob blob-1"></span>
            <span class="blob blob-2"></span>
            <span class="blob blob-3"></span>
        </div>
        <div class="hero-content">
            <h1 class="hero-title">Color Palette <span class="gradient-text">Explorer</span></h1>
            <p class="hero-subtitle">
                Twenty handpicked colors. Click any card to copy its HEX,
                paint the page, and build your recently-viewed collection.
            </p>
            <div class="search-wrap">
                <span class="search-icon">🔍</span>
                <input id="search" class="search" type="search"
                       placeholder="Search by name or HEX…" autocomplete="off"
                       aria-label="Search colors">
            </div>
        </div>
    </section>

    <main class="container">
        <!-- Recently viewed -->
        <section id="recent-section" class="recent hidden">
            <h2 class="section-title">Recently Viewed</h2>
            <div id="recent-list" class="recent-list"></div>
        </section>

        <!-- Color grid -->
        <section class="palette">
            <h2 class="section-title">The Palette</h2>
            <div id="grid" class="grid" aria-live="polite"></div>
            <p id="empty-state" class="empty-state hidden">No colors match your search.</p>
        </section>
    </main>

    <footer class="footer">
        <p>Built with ❤ using Quarkus 3 &amp; Java 21 · Click a color to copy it</p>
    </footer>

    <script src="js/app.js"></script>
</body>
</html>
