# ---------------------------------------------------------------------------
# Color Palette Explorer - Quarkus configuration
# ---------------------------------------------------------------------------
quarkus.application.name=colour-explorer

# HTTP server
quarkus.http.port=8080
quarkus.http.root-path=/

# Serve index.html for the web application root
quarkus.http.enable-compression=true

# Where clicked colors are persisted as a local JSON file
app.viewed-colors.file=data/viewed-colors.json
app.recently-viewed.limit=5

# Logging
quarkus.log.console.enable=true
quarkus.log.level=INFO
quarkus.log.category."com.eazybytes".level=DEBUG

# Banner
quarkus.banner.enabled=true
